name: Update Plugin Registry

on:
  repository_dispatch:
    types: [plugin-released]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  rebuild-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild updatePlugins.xml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p _site

          echo '<?xml version="1.0" encoding="UTF-8"?>' > _site/updatePlugins.xml
          echo '<plugins>' >> _site/updatePlugins.xml

          for plugin_file in plugins/*.json; do
            [ -f "$plugin_file" ] || continue

            PLUGIN_ID=$(jq -r '.id' "$plugin_file")
            REPO=$(jq -r '.repo' "$plugin_file")
            NAME=$(jq -r '.name' "$plugin_file")
            DESCRIPTION=$(jq -r '.description' "$plugin_file")
            VENDOR=$(jq -r '.vendor' "$plugin_file")
            SINCE_BUILD=$(jq -r '.sinceBuild' "$plugin_file")
            UNTIL_BUILD=$(jq -r '.untilBuild' "$plugin_file")

            echo "Processing $NAME ($REPO)..."

            RELEASE_JSON=$(gh api "repos/$REPO/releases/latest" 2>/dev/null || echo '{}')
            TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name // empty')

            if [ -z "$TAG" ]; then
              echo "  No releases found, skipping"
              continue
            fi

            VERSION="${TAG#v}"
            DOWNLOAD_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | endswith(".zip")) | .browser_download_url' | head -1)

            if [ -z "$DOWNLOAD_URL" ]; then
              echo "  No ZIP asset in release $TAG, skipping"
              continue
            fi

            echo "  Version: $VERSION, URL: $DOWNLOAD_URL"
            echo "  <plugin id=\"$PLUGIN_ID\" url=\"$DOWNLOAD_URL\" version=\"$VERSION\">" >> _site/updatePlugins.xml
            echo "    <idea-version since-build=\"$SINCE_BUILD\" until-build=\"$UNTIL_BUILD\"/>" >> _site/updatePlugins.xml
            echo "    <name>$NAME</name>" >> _site/updatePlugins.xml
            echo "    <description>$DESCRIPTION</description>" >> _site/updatePlugins.xml
            echo "    <vendor>$VENDOR</vendor>" >> _site/updatePlugins.xml
            echo "  </plugin>" >> _site/updatePlugins.xml
          done

          echo '</plugins>' >> _site/updatePlugins.xml

          echo ""
          echo "=== Generated updatePlugins.xml ==="
          cat _site/updatePlugins.xml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
